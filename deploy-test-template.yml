# ============================================================================
# TEMPLATE: Deploy to TEST Environment
# ============================================================================
# Description: SSH deploys the latest image to the test server, restarts container.
# Setup: Add SERVER_HOST, SERVER_USER, and SERVER_SSH_KEY to environment secrets.
# ============================================================================

name: "Deploy → TEST Environment [TEMPLATE]"

on:
  workflow_run:
    workflows: ["Build & Push Docker Image [TEMPLATE]"]
    types: [completed]
    branches: [develop]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag to deploy"
        required: false
        default: "develop"

env:
  DEPLOY_ENV: test
  APP_PORT: 8080 # Port exposed on host
  CONTAINER_PORT: 8080 # Port exposed inside container
  CONTAINER_NAME: "myapp-backend-test"

jobs:
  deploy-test:
    name: "🚀 Deploy to TEST"
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    environment:
      name: test # Targets the 'test' GitHub Environment

    steps:
      - name: "⬇️ Checkout code"
        uses: actions/checkout@v4

      - name: "🏷️ Determine image tag"
        id: tag
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "IMAGE_TAG=${{ github.event.inputs.image_tag }}" >> $GITHUB_OUTPUT
          else
            echo "IMAGE_TAG=develop" >> $GITHUB_OUTPUT
          fi

      - name: "🔑 Deploy to server via SSH"
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
            docker pull ${{ secrets.DOCKERHUB_REPO }}:${{ steps.tag.outputs.IMAGE_TAG }}
            
            # Stop and remove old container
            docker stop ${{ env.CONTAINER_NAME }} || true
            docker rm ${{ env.CONTAINER_NAME }} || true
            
            # Run container with environment variables
            docker run -d \
              --name ${{ env.CONTAINER_NAME }} \
              --restart unless-stopped \
              -p ${{ env.APP_PORT }}:${{ env.CONTAINER_PORT }} \
              -e SPRING_PROFILES_ACTIVE=test \
              -e SPRING_DATASOURCE_URL=jdbc:postgresql://${{ secrets.DB_HOST }}:${{ secrets.DB_PORT }}/${{ secrets.DB_NAME }} \
              -e SPRING_DATASOURCE_USERNAME=${{ secrets.DB_USER }} \
              -e SPRING_DATASOURCE_PASSWORD=${{ secrets.DB_PASSWORD }} \
              ${{ secrets.DOCKERHUB_REPO }}:${{ steps.tag.outputs.IMAGE_TAG }}
            
            docker image prune -f

  smoke-test:
    name: "🔥 Smoke Tests"
    runs-on: ubuntu-latest
    needs: deploy-test
    environment:
      name: test
    steps:
      - name: "⏳ Wait for app startup"
        run: sleep 30

      - name: "🏥 Health check"
        run: |
          for i in {1..10}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              --connect-timeout 5 \
              --max-time 10 \
              http://${{ secrets.SERVER_HOST }}:${{ env.APP_PORT }}/actuator/health || echo "000")
            if [ "$STATUS" == "200" ]; then
              echo "✅ Health check passed!"
              exit 0
            fi
            echo "⏳ Attempt $i/10 — Retrying in 10s..."
            sleep 10
          done
          echo "❌ Health check FAILED"
          exit 1
